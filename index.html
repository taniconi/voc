<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulary Quiz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111418;
      --bg-elevated: #1a1f26;
      --surface: #20262e;
      --surface-strong: #27303a;
      --surface-soft: #242b34;
      --line: rgba(255, 255, 255, 0.09);
      --text: #f2f3f7;
      --text-muted: #b7bdc9;
      --primary: #7ec4f4;
      --primary-strong: #68b4e8;
      --secondary: #91a7ff;
      --success: #7fe3b3;
      --error: #ff8c8c;
      --warning: #ffd37d;
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Noto Sans JP", "Noto Sans", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: 32px 20px 120px;
      overflow-x: hidden;
    }

    .background-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .background-grid {
      opacity: 0.08;
    }

    .app-shell {
      position: relative;
      z-index: 1;
      max-width: 920px;
      margin: 0 auto;
    }

    .hidden {
      display: none;
    }

    .panel {
      position: relative;
      overflow: hidden;
      background: var(--bg-elevated);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
    }

    .gate-shell {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 8vh auto 0;
    }

    .gate-card {
      padding: 28px;
      display: grid;
      gap: 18px;
    }

    .gate-title {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      line-height: 1.1;
      letter-spacing: -0.04em;
    }

    .gate-text {
      margin: 0;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .gate-visual {
      width: 72px;
      height: 72px;
      color: var(--primary);
    }

    .gate-form {
      display: grid;
      gap: 12px;
    }

    .gate-error {
      min-height: 24px;
      margin: 0;
      color: var(--error);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .controls-panel {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 5;
      width: min(640px, calc(100vw - 24px));
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
      margin-bottom: 0;
      background: rgba(26, 31, 38, 0.92);
      backdrop-filter: blur(18px);
      box-shadow: 0 22px 44px rgba(0, 0, 0, 0.32);
    }

    #controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    button {
      appearance: none;
      border: none;
      cursor: pointer;
      font: inherit;
    }

    .mode-button {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 8px 10px;
      border-radius: var(--radius-md);
      text-align: center;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text);
      min-height: 84px;
    }

    .mode-button .mode-title {
      display: block;
      font-weight: 700;
      font-size: 0.74rem;
      line-height: 1.2;
      letter-spacing: 0.01em;
      color: var(--text-muted);
    }

    .mode-copy {
      min-width: 0;
      width: 100%;
    }

    .mode-button.active {
      background: rgba(126, 196, 244, 0.12);
      border-color: rgba(126, 196, 244, 0.34);
    }

    .mode-visual {
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      color: var(--text-muted);
      opacity: 0.95;
    }

    .mode-button.active .mode-title,
    .mode-button.active .mode-visual {
      color: var(--primary);
    }

    .card {
      padding: 24px;
    }

    .quiz-card {
      display: grid;
      gap: 18px;
      text-align: left;
    }

    .quiz-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .quiz-chip-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .quiz-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--line);
      font-size: 0.92rem;
    }

    .quiz-chip strong {
      color: var(--text);
      font-weight: 700;
    }

    .progress-wrap {
      position: relative;
      width: min(280px, 100%);
      padding-top: 18px;
    }

    .progress {
      position: relative;
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: var(--surface);
      overflow: hidden;
    }

    .progress-bar {
      position: absolute;
      inset: 0 auto 0 0;
      border-radius: inherit;
      background: var(--success);
    }

    .progress-bonus {
      position: absolute;
      right: 0;
      top: 0;
      color: var(--success);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      opacity: 0;
      transform: translateY(0);
      pointer-events: none;
    }

    .progress-bonus.show {
      animation: progressBonusFloat 0.65s ease-out forwards;
    }

    .prompt-block {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 20px;
    }

    .prompt-label {
      margin: 0 0 10px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .prompt-text {
      margin: 0;
      font-size: clamp(1.05rem, 2vw, 1.28rem);
      line-height: 1.8;
      color: var(--text);
    }

    .answer-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: stretch;
    }

    input {
      flex: 1 1 260px;
      min-width: 0;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: 18px;
      padding: 16px 18px;
      outline: none;
      font-size: 1rem;
    }

    input:focus {
      border-color: rgba(126, 196, 244, 0.52);
      background: var(--surface-strong);
    }

    .primary-button {
      padding: 16px 22px;
      border-radius: 18px;
      background: var(--primary);
      color: #0b2230;
      font-weight: 700;
    }

    .choices-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .choice-button {
      padding: 18px;
      border-radius: 20px;
      text-align: left;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 600;
      min-height: 68px;
      line-height: 1.5;
    }

    .choice-button.correct {
      border-color: var(--success);
    }

    .choice-button.incorrect {
      border-color: var(--error);
      animation: choiceShake 0.28s ease-in-out 1;
    }

    @keyframes progressBonusFloat {
      0% {
        opacity: 0;
        transform: translateY(6px);
      }
      20% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(-10px);
      }
    }

    @keyframes choiceShake {
      0%, 100% {
        transform: translateX(0);
      }
      25% {
        transform: translateX(-3px);
      }
      50% {
        transform: translateX(3px);
      }
      75% {
        transform: translateX(-2px);
      }
    }

    .result {
      min-height: 30px;
      margin-top: 6px;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.01em;
    }

    .helper-note {
      color: var(--text-muted);
      font-size: 0.92rem;
      margin: 0;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .meta-card {
      padding: 16px 18px;
      border-radius: var(--radius-md);
      background: var(--surface);
      border: 1px solid var(--line);
    }

    .meta-label {
      margin: 0 0 6px;
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .meta-value {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.5;
      font-weight: 700;
    }

    .result.success {
      color: var(--success);
    }

    .result.error {
      color: var(--error);
    }

    .profile-shell {
      display: grid;
      gap: 18px;
    }

    .profile-hero {
      display: grid;
      gap: 12px;
      padding: 24px;
      border-radius: var(--radius-lg);
      background:
        radial-gradient(circle at top right, rgba(126, 196, 244, 0.18), transparent 32%),
        linear-gradient(145deg, rgba(145, 167, 255, 0.12), rgba(127, 227, 179, 0.08)),
        var(--surface);
      border: 1px solid var(--line);
    }

    .profile-kicker {
      margin: 0;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .profile-heading {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .profile-name {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
    }

    .secondary-button {
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 700;
    }

    .icon-button {
      width: 52px;
      height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      color: var(--text);
      flex: 0 0 auto;
    }

    .icon-button svg {
      width: 24px;
      height: 24px;
    }

    .settings-panel {
      display: grid;
      gap: 12px;
      padding: 18px;
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .settings-copy {
      min-width: 0;
    }

    .settings-title {
      margin: 0 0 4px;
      font-size: 0.98rem;
      font-weight: 700;
    }

    .settings-note {
      margin: 0;
      color: var(--text-muted);
      line-height: 1.6;
      font-size: 0.92rem;
    }

    .toggle-switch {
      position: relative;
      width: 58px;
      height: 34px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid var(--line);
      flex: 0 0 auto;
    }

    .toggle-switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 4px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.18s ease;
    }

    .toggle-switch.active {
      background: rgba(127, 227, 179, 0.22);
      border-color: rgba(127, 227, 179, 0.32);
    }

    .toggle-switch.active::after {
      transform: translateX(23px);
    }

    .danger-button {
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(255, 140, 140, 0.14);
      border: 1px solid rgba(255, 140, 140, 0.32);
      color: var(--error);
      font-weight: 700;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-card {
      padding: 18px;
      border-radius: var(--radius-lg);
      background: var(--surface);
      border: 1px solid var(--line);
      display: grid;
      gap: 12px;
    }

    .stat-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
    }

    .stat-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .stat-rate {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--primary);
    }

    .stat-values {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat-gauge {
      position: relative;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
    }

    .stat-gauge-fill {
      position: absolute;
      top: 0;
      bottom: 0;
    }

    .stat-gauge-fill.correct {
      left: 0;
      background: linear-gradient(90deg, rgba(127, 227, 179, 0.75), rgba(127, 227, 179, 1));
    }

    .stat-gauge-fill.incorrect {
      right: 0;
      background: linear-gradient(90deg, rgba(255, 140, 140, 1), rgba(255, 140, 140, 0.75));
    }

    .stat-gauge-center {
      position: absolute;
      top: 1px;
      bottom: 1px;
      left: 50%;
      width: 1px;
      background: rgba(255, 255, 255, 0.16);
      transform: translateX(-50%);
    }

    .stat-item {
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--line);
    }

    .stat-label {
      margin: 0 0 6px;
      font-size: 0.76rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .stat-value {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 800;
    }

    .profile-empty {
      padding: 16px 18px;
      border-radius: var(--radius-md);
      border: 1px dashed rgba(255, 255, 255, 0.14);
      color: var(--text-muted);
      line-height: 1.7;
    }

    @media (max-width: 780px) {
      body {
        padding: 18px 14px 116px;
      }

      #controls {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .choices-grid {
        grid-template-columns: 1fr;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .profile-heading,
      .settings-row {
        align-items: stretch;
      }
    }

    @media (max-width: 520px) {
      .card,
      .controls-panel {
        padding: 12px;
      }

      .controls-panel {
        bottom: 12px;
        width: calc(100vw - 16px);
        padding: 8px 10px calc(8px + env(safe-area-inset-bottom, 0px));
      }

      .mode-button {
        min-height: 76px;
        padding: 10px 6px 8px;
      }

      .mode-visual {
        width: 30px;
        height: 30px;
      }

      .mode-button .mode-title {
        font-size: 0.64rem;
      }
    }
  </style>
</head>
<body>
<svg class="background-grid" viewBox="0 0 1600 900" aria-hidden="true">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#grid)"></rect>
</svg>

<section class="gate-shell" id="gateScreen">
  <div class="gate-card panel">
    <svg class="gate-visual" viewBox="0 0 80 80" aria-hidden="true">
      <rect x="16" y="34" width="48" height="30" rx="10" fill="none" stroke="currentColor" stroke-width="2.5"></rect>
      <path d="M28 34v-8c0-7.2 5.5-12 12-12s12 4.8 12 12v8" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"></path>
      <circle cx="40" cy="48" r="4" fill="currentColor"></circle>
    </svg>
    <div>
      <h1 class="gate-title">Vocabulary Quiz</h1>
      <p class="gate-text">アクセスコードを入力すると、次回以降はそのまま開けます。</p>
    </div>
    <div class="gate-form">
      <input id="accessCode" type="password" inputmode="numeric" placeholder="アクセスコードを入力">
      <button class="primary-button" onclick="submitAccessCode()">開く</button>
      <p class="gate-error" id="gateError"></p>
    </div>
  </div>
</section>

<main class="app-shell hidden" id="appShell">
  <section class="controls-panel panel">
    <div id="controls"></div>
  </section>

  <section class="card panel" id="quiz"></section>
</main>

<script>
const SHEET_ID = '1jVf7SnTUsMpyjwOPHk8gJtM21F8HmYC6MFTjTUY04Aw';
const SHEET_GID = '0';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}`;
const PROFILE_COOKIE = 'voc_profile';
const ACCESS_COOKIE = 'voc_access_granted';

const MODE_LABELS = {
  definition_to_word: '定義→英単語',
  word_to_japanese: '英単語→日本語',
  japanese_to_word: '日本語→英単語',
  my_page: 'マイページ'
};

const QUIZ_MODES = ['definition_to_word', 'word_to_japanese', 'japanese_to_word'];

let entries = [];
let accessCode = '';
let mode = 'definition_to_word';
let current = 0;
let order = [];
let profile = createDefaultProfile();
let questionSession = null;
let settingsOpen = false;

const controls = document.getElementById('controls');
const gateScreen = document.getElementById('gateScreen');
const appShell = document.getElementById('appShell');

function parseGoogleVisualizationResponse(text) {
  const prefix = 'google.visualization.Query.setResponse(';
  const start = text.indexOf(prefix);
  const end = text.lastIndexOf(');');

  if (start === -1 || end === -1) {
    throw new Error('Unexpected Google Sheets response.');
  }

  return JSON.parse(text.slice(start + prefix.length, end));
}

function normalizeCell(cell) {
  if (!cell) return '';
  const value = cell.f ?? cell.v ?? '';
  return String(value).trim();
}

function normalizeEntry(row) {
  const cells = row.c ?? [];
  const word = normalizeCell(cells[0]);
  const jp = normalizeCell(cells[1]);
  const def = normalizeCell(cells[2]);
  const example = normalizeCell(cells[3]);

  if (!word || !jp || !def) {
    return null;
  }

  return { word, jp, def, example };
}

async function loadSheetData() {
  const response = await fetch(SHEET_URL);

  if (!response.ok) {
    throw new Error(`Failed to load sheet data: ${response.status}`);
  }

  const text = await response.text();
  const payload = parseGoogleVisualizationResponse(text);
  const rows = payload.table?.rows ?? [];

  if (!rows.length) {
    throw new Error('No rows found in sheet.');
  }

  accessCode = rows
    .map(row => normalizeCell(row.c?.[4]))
    .find(Boolean) || '';

  entries = rows
    .map(normalizeEntry)
    .filter(Boolean);

  if (!entries.length) {
    throw new Error('No valid vocabulary rows found in sheet.');
  }

  if (!accessCode) {
    throw new Error('Access code not found in password column.');
  }
}

function createDefaultStats() {
  return { attempted: 0, correct: 0 };
}

function createDefaultProfile() {
  return {
    name: 'Your Name',
    keepLoggedIn: false,
    stats: {
      definition_to_word: createDefaultStats(),
      word_to_japanese: createDefaultStats(),
      japanese_to_word: createDefaultStats()
    }
  };
}

function setCookie(name, value, days = 365) {
  const expires = new Date(Date.now() + days * 24 * 60 * 60 * 1000).toUTCString();
  document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Lax`;
}

function getCookie(name) {
  const prefix = `${name}=`;
  const cookies = document.cookie ? document.cookie.split('; ') : [];
  for (const cookie of cookies) {
    if (cookie.startsWith(prefix)) {
      return decodeURIComponent(cookie.slice(prefix.length));
    }
  }
  return '';
}

function loadProfile() {
  const raw = getCookie(PROFILE_COOKIE);
  if (!raw) return createDefaultProfile();

  try {
    const parsed = JSON.parse(raw);
    return {
      name: typeof parsed.name === 'string' && parsed.name.trim() ? parsed.name.trim() : 'Your Name',
      keepLoggedIn: Boolean(parsed.keepLoggedIn),
      stats: {
        definition_to_word: {
          ...createDefaultStats(),
          ...(parsed.stats?.definition_to_word || {})
        },
        word_to_japanese: {
          ...createDefaultStats(),
          ...(parsed.stats?.word_to_japanese || {})
        },
        japanese_to_word: {
          ...createDefaultStats(),
          ...(parsed.stats?.japanese_to_word || {})
        }
      }
    };
  } catch (error) {
    console.warn('Failed to parse profile cookie.', error);
    return createDefaultProfile();
  }
}

function saveProfile() {
  setCookie(PROFILE_COOKIE, JSON.stringify(profile));
}

function setAccessCookie(value, days = 30) {
  const expires = new Date(Date.now() + days * 24 * 60 * 60 * 1000).toUTCString();
  document.cookie = `${ACCESS_COOKIE}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Lax`;
}

function getAccessCookie() {
  return getCookie(ACCESS_COOKIE);
}

function clearAccessCookie() {
  document.cookie = `${ACCESS_COOKIE}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; SameSite=Lax`;
}

function ensureQuestionSession() {
  if (!questionSession) {
    questionSession = {
      mode,
      answered: false
    };
  }
}

function recordQuestionOutcome(isCorrectOnFirstTry) {
  if (!QUIZ_MODES.includes(mode)) return;
  ensureQuestionSession();
  if (questionSession.answered) return;

  const stats = profile.stats[mode];
  stats.attempted += 1;
  if (isCorrectOnFirstTry) {
    stats.correct += 1;
  }

  questionSession.answered = true;
  saveProfile();
}

function getAccuracy(stats) {
  if (!stats.attempted) return '0%';
  return `${Math.round((stats.correct / stats.attempted) * 100)}%`;
}

function getGaugeWidths(stats) {
  if (!stats.attempted) {
    return { correct: 0, incorrect: 0 };
  }

  const correct = (stats.correct / stats.attempted) * 100;
  const incorrect = Math.max(0, 100 - correct);
  return { correct, incorrect };
}

function getTotalStats() {
  return QUIZ_MODES.reduce((acc, key) => {
    acc.attempted += profile.stats[key].attempted;
    acc.correct += profile.stats[key].correct;
    return acc;
  }, createDefaultStats());
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function escapeRegExp(text) {
  return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function getMaskCandidates(word) {
  const lower = word.toLowerCase();
  const forms = new Set([lower]);

  forms.add(`${lower}s`);
  forms.add(`${lower}es`);
  forms.add(`${lower}ed`);
  forms.add(`${lower}ing`);

  if (lower.endsWith('e')) {
    forms.add(`${lower}d`);
    forms.add(`${lower.slice(0, -1)}ing`);
  }

  if (lower.endsWith('y') && lower.length > 1) {
    const stem = lower.slice(0, -1);
    forms.add(`${stem}ies`);
    forms.add(`${stem}ied`);
    forms.add(`${stem}ying`);
  }

  if (/[sxz]$/.test(lower) || /(sh|ch)$/.test(lower)) {
    forms.add(`${lower}es`);
  }

  return [...forms].sort((a, b) => b.length - a.length);
}

function maskWord(text, word) {
  if (!text || !word) return text;
  const variants = getMaskCandidates(word);

  return text.replace(/[A-Za-z]+/g, (token) => {
    const matched = variants.find((variant) => token.toLowerCase() === variant);
    return matched ? '_'.repeat(token.length) : token;
  });
}

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function getCurrentEntry() {
  return entries[order[current]];
}

function getProgressWidth() {
  if (!entries.length) return '0%';
  return `${((current + 1) / entries.length) * 100}%`;
}

function renderMetaCards(items) {
  return `
    <div class="meta-grid">
      ${items.map(item => `
        <div class="meta-card">
          <p class="meta-label">${item.label}</p>
          <p class="meta-value">${item.value}</p>
        </div>
      `).join('')}
    </div>
  `;
}

function renderCard(label, promptTitle, promptText, body, metaItems = []) {
  document.getElementById("quiz").innerHTML = `
    <div class="quiz-card">
      <div class="quiz-topbar">
        <div class="quiz-chip-wrap">
          <div class="quiz-chip"><strong>${MODE_LABELS[mode]}</strong></div>
          <div class="quiz-chip">Question <strong>${current + 1}</strong> / ${entries.length}</div>
        </div>
        <div class="progress-wrap">
          <div class="progress-bonus" id="progressBonus">+1</div>
          <div class="progress" aria-hidden="true">
            <div class="progress-bar" style="width: ${getProgressWidth()}"></div>
          </div>
        </div>
      </div>
      <div class="prompt-block">
        <p class="prompt-label">${label}</p>
        <p class="prompt-text"><strong>${promptTitle}</strong><br>${promptText}</p>
      </div>
      ${metaItems.length ? renderMetaCards(metaItems) : ''}
      ${body}
    </div>
  `;
}

function renderLoadError(message) {
  controls.innerHTML = '';
  document.getElementById("quiz").innerHTML = `
    <div class="quiz-card">
      <div class="prompt-block">
        <p class="prompt-label">Data Error</p>
        <p class="prompt-text"><strong>シートを読み込めませんでした。</strong><br>${message}</p>
      </div>
    </div>
  `;
}

function renderProfilePage() {
  const total = getTotalStats();
  document.getElementById("quiz").innerHTML = `
    <div class="profile-shell">
      <section class="profile-hero">
        <p class="profile-kicker">My Page</p>
        <div class="profile-heading">
          <h2 class="profile-name">${escapeHtml(profile.name)}</h2>
          <button class="icon-button" id="toggleSettings" aria-label="設定">
            <svg viewBox="0 0 48 48" aria-hidden="true">
              <path d="M19 8h10l1.7 4.7 4.8 2.1 4.6-1.8 5 8.7-3.4 3.6.4 5.2 4 3-5 8.7-5-1.5-4.5 2.6L29 40H19l-1.8-4.7-4.7-2.1-4.8 1.5-5-8.7 4-3 .4-5.2-3.4-3.6 5-8.7 4.6 1.8 4.8-2.1z" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"></path>
              <circle cx="24" cy="24" r="6.5" fill="none" stroke="currentColor" stroke-width="2.2"></circle>
            </svg>
          </button>
        </div>
        ${settingsOpen ? renderSettingsPanel() : ''}
      </section>
      <section class="stats-grid">
        ${renderStatCard('トータル', total)}
        ${QUIZ_MODES.map(key => renderStatCard(MODE_LABELS[key], profile.stats[key])).join('')}
      </section>
      ${total.attempted ? '' : '<div class="profile-empty">まだ記録がありません。問題を解くと、ここに正解率と解いた問題数がたまっていきます。</div>'}
    </div>
  `;

  document.getElementById('toggleSettings')?.addEventListener('click', toggleSettings);
  document.getElementById('changeProfileName')?.addEventListener('click', updateProfileName);
  document.getElementById('toggleKeepLoggedIn')?.addEventListener('click', toggleKeepLoggedIn);
  document.getElementById('clearProfileData')?.addEventListener('click', clearProfileData);
}

function renderSettingsPanel() {
  return `
    <div class="settings-panel">
      <div class="settings-row">
        <div class="settings-copy">
          <p class="settings-title">名前変更</p>
          <p class="settings-note">マイページ上に表示する名前を変更します。</p>
        </div>
        <button class="secondary-button" id="changeProfileName">変更</button>
      </div>
      <div class="settings-row">
        <div class="settings-copy">
          <p class="settings-title">ログインを維持</p>
          <p class="settings-note">オンにすると、次回以降はアクセスコード入力を省略します。</p>
        </div>
        <button class="toggle-switch ${profile.keepLoggedIn ? 'active' : ''}" id="toggleKeepLoggedIn" aria-label="ログインを維持"></button>
      </div>
      <div class="settings-row">
        <div class="settings-copy">
          <p class="settings-title">データ削除</p>
          <p class="settings-note">名前・成績・ログイン状態を削除して初期化します。</p>
        </div>
        <button class="danger-button" id="clearProfileData">削除</button>
      </div>
    </div>
  `;
}

function renderStatCard(title, stats) {
  const gauge = getGaugeWidths(stats);
  const incorrect = Math.max(0, stats.attempted - stats.correct);
  return `
    <article class="stat-card">
      <div class="stat-head">
        <h3 class="stat-title">${escapeHtml(title)}</h3>
        <p class="stat-rate">${getAccuracy(stats)}</p>
      </div>
      <div class="stat-gauge" aria-hidden="true">
        <div class="stat-gauge-fill correct" style="width: ${gauge.correct}%"></div>
        <div class="stat-gauge-fill incorrect" style="width: ${gauge.incorrect}%"></div>
        <div class="stat-gauge-center"></div>
      </div>
      <div class="stat-values">
        <div class="stat-item">
          <p class="stat-label">Correct</p>
          <p class="stat-value">${stats.correct}</p>
        </div>
        <div class="stat-item">
          <p class="stat-label">Incorrect</p>
          <p class="stat-value">${incorrect}</p>
        </div>
        <div class="stat-item">
          <p class="stat-label">Solved</p>
          <p class="stat-value">${stats.attempted}</p>
        </div>
        <div class="stat-item">
          <p class="stat-label">Remaining</p>
          <p class="stat-value">${Math.max(0, entries.length - Math.min(entries.length, stats.attempted))}</p>
        </div>
      </div>
    </article>
  `;
}

function updateProfileName() {
  const nextName = window.prompt('表示名を入力してください。', profile.name);
  if (nextName === null) return;
  const trimmed = nextName.trim();
  if (!trimmed) return;
  profile.name = trimmed;
  saveProfile();
  if (mode === 'my_page') {
    renderProfilePage();
  }
}

function toggleSettings() {
  settingsOpen = !settingsOpen;
  if (mode === 'my_page') {
    renderProfilePage();
  }
}

function toggleKeepLoggedIn() {
  profile.keepLoggedIn = !profile.keepLoggedIn;
  saveProfile();

  if (profile.keepLoggedIn) {
    setAccessCookie('1');
  } else {
    clearAccessCookie();
  }

  if (mode === 'my_page') {
    renderProfilePage();
  }
}

function clearProfileData() {
  const confirmed = window.confirm('名前、成績、ログイン状態を削除します。よろしいですか？');
  if (!confirmed) return;

  profile = createDefaultProfile();
  settingsOpen = false;
  clearAccessCookie();
  document.cookie = `${PROFILE_COOKIE}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; SameSite=Lax`;

  if (mode === 'my_page') {
    renderProfilePage();
  }
}

function updateControls() {
  controls.innerHTML = `
    <button class="mode-button ${mode === 'definition_to_word' ? 'active' : ''}" onclick="setMode('definition_to_word')">
      <span class="mode-copy">
        <span class="mode-title">定義→英単語</span>
      </span>
      <svg class="mode-visual" viewBox="0 0 48 48" aria-hidden="true">
        <rect x="8" y="9" width="32" height="30" rx="8" fill="none" stroke="currentColor" stroke-width="2"></rect>
        <path d="M15 19h18M15 25h14M15 31h10" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"></path>
      </svg>
    </button>
    <button class="mode-button ${mode === 'word_to_japanese' ? 'active' : ''}" onclick="setMode('word_to_japanese')">
      <span class="mode-copy">
        <span class="mode-title">英単語→日本語</span>
      </span>
      <svg class="mode-visual" viewBox="0 0 48 48" aria-hidden="true">
        <path d="M10 24h22" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
        <path d="M25 16l8 8-8 8" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    </button>
    <button class="mode-button ${mode === 'japanese_to_word' ? 'active' : ''}" onclick="setMode('japanese_to_word')">
      <span class="mode-copy">
        <span class="mode-title">日本語→英単語</span>
      </span>
      <svg class="mode-visual" viewBox="0 0 48 48" aria-hidden="true">
        <path d="M38 24H16" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
        <path d="M23 16l-8 8 8 8" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    </button>
    <button class="mode-button ${mode === 'my_page' ? 'active' : ''}" onclick="setMode('my_page')">
      <span class="mode-copy">
        <span class="mode-title">マイページ</span>
      </span>
      <svg class="mode-visual" viewBox="0 0 48 48" aria-hidden="true">
        <circle cx="24" cy="16" r="7" fill="none" stroke="currentColor" stroke-width="2.6"></circle>
        <path d="M11 38c2.5-6 8-10 13-10s10.5 4 13 10" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"></path>
      </svg>
    </button>
  `;
}

function markChoice(button, isCorrect) {
  button.classList.add(isCorrect ? 'correct' : 'incorrect');

  if (!isCorrect) {
    setTimeout(() => {
      button.classList.remove('incorrect');
    }, 900);
  }
}

function showProgressBonus() {
  const bonus = document.getElementById("progressBonus");
  if (!bonus) return;
  bonus.classList.remove("show");
  void bonus.offsetWidth;
  bonus.classList.add("show");
}

function handleCorrect() {
  showProgressBonus();
  setTimeout(() => nextQuestion(), 500);
}

function nextQuestion() {
  current += 1;
  questionSession = null;

  if (current >= order.length) {
    order = [...entries.keys()];
    shuffle(order);
    current = 0;
  }

  renderCurrentQuestion();
}

function getChoices(correct, pool) {
  const uniquePool = pool.filter(Boolean);
  const set = new Set([correct]);

  while (set.size < Math.min(4, uniquePool.length)) {
    set.add(uniquePool[Math.floor(Math.random() * uniquePool.length)]);
  }

  const choices = [...set];
  shuffle(choices);
  return choices;
}

function renderChoiceButtons(choices) {
  return `
    <div class="choices-grid">
      ${choices.map(choice => `<button class="choice-button" data-choice="${escapeHtml(choice)}">${escapeHtml(choice)}</button>`).join('')}
    </div>
  `;
}

function bindChoiceButtons() {
  document.querySelectorAll('.choice-button').forEach((button) => {
    button.addEventListener('click', () => {
      checkChoice(button, button.dataset.choice || '');
    });
  });
}

function showDefinitionToWord() {
  const entry = getCurrentEntry();
  const maskedDefinition = maskWord(entry.def, entry.word);
  const maskedExample = maskWord(entry.example, entry.word);

  renderCard(
    'Definition',
    maskedDefinition,
    maskedExample || 'この定義と例文に合う英単語を入力してください。',
    `
      <div class="answer-row">
        <input id="answer" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="英単語を入力">
        <button class="primary-button" onclick="checkDefinitionToWord()">答え合わせ</button>
      </div>
      <div id="result" class="result"></div>
    `
  );

  document.getElementById("answer").addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      checkDefinitionToWord();
    }
  });
}

function checkDefinitionToWord() {
  ensureQuestionSession();
  const user = document.getElementById("answer").value.trim().toLowerCase();
  const correct = getCurrentEntry().word.toLowerCase();
  const result = document.getElementById("result");

  result.className = 'result';

  if (user === correct) {
    recordQuestionOutcome(!questionSession.answered);
    result.textContent = '正解！';
    result.classList.add('success');
    handleCorrect();
    return;
  }

  recordQuestionOutcome(false);
  result.textContent = `不正解… ${getCurrentEntry().word}`;
  result.classList.add('error');
}

function showWordToJapanese() {
  const entry = getCurrentEntry();
  const choices = getChoices(entry.jp, entries.map(item => item.jp));

  renderCard(
    'Word',
    entry.word,
    '',
    renderChoiceButtons(choices)
  );

  bindChoiceButtons();
}

function showJapaneseToWord() {
  const entry = getCurrentEntry();
  const choices = getChoices(entry.word, entries.map(item => item.word));

  renderCard(
    'Japanese',
    entry.jp,
    '',
    renderChoiceButtons(choices)
  );

  bindChoiceButtons();
}

function checkChoice(button, selected) {
  ensureQuestionSession();
  const entry = getCurrentEntry();
  const correct = mode === 'word_to_japanese' ? entry.jp : entry.word;

  if (selected === correct) {
    recordQuestionOutcome(!questionSession.answered);
    markChoice(button, true);
    handleCorrect();
  } else {
    recordQuestionOutcome(false);
    markChoice(button, false);
  }
}

function renderCurrentQuestion() {
  if (!entries.length) {
    renderLoadError('Google Sheets の単語データを読み込めていません。');
    return;
  }

  if (mode === 'my_page') {
    renderProfilePage();
    return;
  }

  if (mode === 'definition_to_word') {
    showDefinitionToWord();
    return;
  }

  if (mode === 'word_to_japanese') {
    showWordToJapanese();
    return;
  }

  showJapaneseToWord();
}

function setMode(nextMode) {
  if (!entries.length && nextMode !== 'my_page') {
    renderLoadError('Google Sheets の単語データを読み込めていません。');
    return;
  }

  mode = nextMode;
  questionSession = null;
  current = 0;
  if (QUIZ_MODES.includes(nextMode)) {
    order = [...entries.keys()];
    shuffle(order);
  }
  updateControls();
  renderCurrentQuestion();
}

function unlockApp() {
  gateScreen.classList.add('hidden');
  appShell.classList.remove('hidden');
  setMode(mode);
}

function submitAccessCode() {
  const input = document.getElementById('accessCode');
  const error = document.getElementById('gateError');
  const code = input.value.trim();

  if (!accessCode) {
    error.textContent = 'アクセスコードを取得できませんでした。パスワード列を確認してください。';
    return;
  }

  if (code === accessCode) {
    if (profile.keepLoggedIn) {
      setAccessCookie('1');
    } else {
      clearAccessCookie();
    }
    error.textContent = '';
    unlockApp();
    return;
  }

  error.textContent = 'アクセスコードが違います。';
  input.select();
}

// ===== 簡易テスト =====
(function test() {
  const sample = getChoices('a', ['a', 'b', 'c', 'd', 'e']);
  console.assert(sample.includes('a'), 'choices must include correct');
})();

async function initializeApp() {
  profile = loadProfile();
  settingsOpen = false;
  try {
    await loadSheetData();
    console.info(`Loaded ${entries.length} rows from Google Sheets.`);
  } catch (error) {
    entries = [];
    accessCode = '';
    console.warn('Failed to load question data.', error);
  }

  if (profile.keepLoggedIn && getAccessCookie() === '1' && entries.length && accessCode) {
    unlockApp();
    return;
  }

  if (!profile.keepLoggedIn) {
    clearAccessCookie();
  }

  document.getElementById('accessCode').addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      submitAccessCode();
    }
  });
}

initializeApp();
</script>
